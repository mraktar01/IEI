[build]
  # The command to build your site (e.g., npm run build)
  command = "npm run build"
  
  # The directory containing your compiled site ready for deployment
  # For React (Vite) it's usually "dist", for Create React App it's "build", for Next.js it's ".next"
  publish = "dist" 

  # The directory where your Netlify Functions live
  functions = "netlify/functions"

# This is crucial for Single Page Applications (like React) to handle routing correctly.
# It redirects all traffic to your index.html so your frontend router can take over.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200